<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Ventas — PySpark + Flask</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background-color: #f0f2f5; }
    .navbar { background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); }
    .card-stat { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-stat .icon-wrap { width: 52px; height: 52px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
    .table thead { background-color: #16213e; color: #fff; }
    .table tbody tr:hover { background-color: #e8f0fe; }
    .badge-rank { width: 26px; height: 26px; border-radius: 50%; display:inline-flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; }
    .spinner-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,.6); z-index:9999; align-items:center; justify-content:center; }
    .spinner-overlay.active { display:flex; }
    .tab-content { padding-top: 1.5rem; }
  </style>
</head>
<body>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="text-center">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
    <p class="mt-3 fw-semibold text-secondary">Procesando con Spark…</p>
  </div>
</div>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
  <span class="navbar-brand fw-bold fs-5">
    <i class="bi bi-bar-chart-fill me-2"></i>Análisis de Ventas — PySpark + Flask
  </span>
  <span class="text-white-50 small">2 000 000 registros</span>
</nav>

<div class="container-fluid px-4">

  <!-- KPIs -->
  <div class="row g-3 mb-4" id="kpiRow">
    <div class="col-12 text-center text-secondary py-4">
      <div class="spinner-border spinner-border-sm me-2"></div>Cargando resumen…
    </div>
  </div>

  <!-- Tabs -->
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-header bg-white border-bottom-0 pt-3">
      <ul class="nav nav-tabs card-header-tabs" id="mainTabs">
        <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="tab" href="#tabCiudad">
            <i class="bi bi-geo-alt me-1"></i>Por Ciudad
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" href="#tabCategoria">
            <i class="bi bi-tag me-1"></i>Por Categoría
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" href="#tabTienda">
            <i class="bi bi-shop me-1"></i>Por Tienda
          </a>
        </li>
      </ul>
    </div>
    <div class="card-body">
      <div class="tab-content">
        <div class="tab-pane fade show active" id="tabCiudad">
          <div id="tablaCiudad"><div class="text-center text-secondary py-4"><div class="spinner-border spinner-border-sm me-2"></div>Cargando…</div></div>
        </div>
        <div class="tab-pane fade" id="tabCategoria">
          <div id="tablaCategoria"><div class="text-center text-secondary py-4"><div class="spinner-border spinner-border-sm me-2"></div>Cargando…</div></div>
        </div>
        <div class="tab-pane fade" id="tabTienda">
          <div id="tablaTienda"><div class="text-center text-secondary py-4"><div class="spinner-border spinner-border-sm me-2"></div>Cargando…</div></div>
        </div>
      </div>
    </div>
  </div>

  <p class="text-center text-muted small mt-4 mb-3">
    Procesado con <strong>Apache Spark (local[*])</strong> · Flask · Bootstrap 5
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const fmt = n => new Intl.NumberFormat("es-CO", {style:"currency", currency:"COP", maximumFractionDigits:0}).format(n);
const fmtNum = n => new Intl.NumberFormat("es-CO").format(n);

function rankColor(i) {
  return i === 0 ? "#ffd700" : i === 1 ? "#c0c0c0" : i === 2 ? "#cd7f32" : "#dee2e6";
}

async function loadKPIs() {
  const res = await fetch("/api/resumen");
  const d = await res.json();
  document.getElementById("kpiRow").innerHTML = `
    <div class="col-sm-6 col-lg-3">
      <div class="card card-stat p-3 h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-wrap" style="background:#e8f5e9;color:#2e7d32;"><i class="bi bi-currency-dollar"></i></div>
          <div>
            <p class="text-muted small mb-0">Total Ventas</p>
            <p class="fw-bold fs-5 mb-0">${fmt(d.gran_total)}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card card-stat p-3 h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-wrap" style="background:#e3f2fd;color:#1565c0;"><i class="bi bi-receipt"></i></div>
          <div>
            <p class="text-muted small mb-0">Transacciones</p>
            <p class="fw-bold fs-5 mb-0">${fmtNum(d.total_transacciones)}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card card-stat p-3 h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-wrap" style="background:#fff3e0;color:#e65100;"><i class="bi bi-graph-up-arrow"></i></div>
          <div>
            <p class="text-muted small mb-0">Promedio por Venta</p>
            <p class="fw-bold fs-5 mb-0">${fmt(d.promedio_general)}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="card card-stat p-3 h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-wrap" style="background:#f3e5f5;color:#6a1b9a;"><i class="bi bi-lightning-charge"></i></div>
          <div>
            <p class="text-muted small mb-0">Tiempo procesamiento</p>
            <p class="fw-bold fs-5 mb-0">${d.tiempo_segundos}s</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildTable(data, labelKey) {
  const maxVal = data[0]?.total_ventas || 1;
  const rows = data.map((r, i) => {
    const pct = Math.round((r.total_ventas / maxVal) * 100);
    return `
      <tr>
        <td>
          <span class="badge-rank text-dark" style="background:${rankColor(i)}">${i+1}</span>
        </td>
        <td class="fw-semibold">${r[labelKey]}</td>
        <td>
          <div class="d-flex align-items-center gap-2">
            <div class="progress flex-grow-1" style="height:8px;">
              <div class="progress-bar bg-primary" style="width:${pct}%"></div>
            </div>
            <span class="text-nowrap small">${fmt(r.total_ventas)}</span>
          </div>
        </td>
        <td class="text-end">${fmtNum(r.num_transacciones)}</td>
        <td class="text-end">${fmt(r.promedio_venta)}</td>
      </tr>`;
  }).join("");

  return `
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>${labelKey.charAt(0).toUpperCase() + labelKey.slice(1)}</th>
            <th>Total Ventas</th>
            <th class="text-end">Transacciones</th>
            <th class="text-end">Promedio</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function loadTabla(endpoint, containerId, labelKey) {
  const res = await fetch(endpoint);
  const data = await res.json();
  document.getElementById(containerId).innerHTML = buildTable(data, labelKey);
}

// Cargamos todo al inicio
loadKPIs();
loadTabla("/api/ciudades",   "tablaCiudad",    "ciudad");
loadTabla("/api/categorias", "tablaCategoria", "categoria");
loadTabla("/api/tiendas",    "tablaTienda",    "tienda");
</script>
</body>
</html>
